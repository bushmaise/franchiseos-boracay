<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FranchiseOS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,500;1,9..144,600&family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a1712; --panel:#112319; --panel2:#14291d;
    --line:rgba(150,190,160,.12);
    --cream:#f3efe3; --muted:#8aa294; --gold:#dca85a; --green:#1f7a4d;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Hanken Grotesk',system-ui,sans-serif;
    background:radial-gradient(1100px 560px at 50% -8%, #16301f, #0a1712 62%);
    color:var(--cream); min-height:100vh;
    display:flex; align-items:center; justify-content:center; padding:24px;
  }
  .wrap{width:100%; max-width:440px; text-align:center}
  .brand{display:flex; align-items:center; justify-content:center; gap:12px; margin-bottom:30px}
  .logo{width:48px;height:48px;border-radius:13px;background:linear-gradient(150deg,#16301f,#0e2016);border:1px solid var(--line);display:flex;align-items:center;justify-content:center}
  .logo svg{width:26px;height:26px}
  .word{font-family:'Fraunces',serif;font-size:30px;font-weight:700;letter-spacing:.4px}
  .word b{color:var(--gold);font-weight:700}
  h1{font-family:'Fraunces',serif;font-size:33px;font-weight:600;line-height:1.18;margin-bottom:12px}
  h1 i{color:var(--gold)}
  p.sub{color:var(--muted);font-size:16px;line-height:1.5;margin-bottom:34px}
  .actions{display:flex;flex-direction:column;gap:12px}
  a.btn{
    display:flex;align-items:center;justify-content:space-between;
    text-decoration:none;color:var(--cream);
    background:linear-gradient(155deg,var(--panel2),var(--panel));
    border:1px solid var(--line);border-radius:16px;
    padding:17px 20px;font-size:17px;font-weight:600;
    transition:border-color .15s ease, transform .05s ease;
  }
  a.btn:hover{border-color:rgba(220,168,90,.55)}
  a.btn:active{transform:translateY(1px)}
  a.btn .label{display:flex;flex-direction:column;align-items:flex-start;gap:3px;text-align:left}
  a.btn .label small{color:var(--muted);font-size:13px;font-weight:500}
  a.btn .arrow{color:var(--gold);font-size:20px;flex:none}
  .foot{margin-top:32px;color:var(--muted);font-size:13px;opacity:.7}
</style>
</head>
<body>
  <main class="wrap">
    <div class="brand">
      <div class="logo" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none">
          <rect x="3" y="13" width="4" height="8" rx="1.2" fill="#1f7a4d"/>
          <rect x="10" y="8" width="4" height="13" rx="1.2" fill="#dca85a"/>
          <rect x="17" y="4" width="4" height="17" rx="1.2" fill="#dca85a"/>
        </svg>
      </div>
      <div class="word">Franchise<b>OS</b></div>
    </div>

    <h1>Run every restaurant from <i>one place</i></h1>
    <p class="sub">Multi-restaurant management — sales, menus, and insights in real time.</p>

    <nav class="actions">
      <a class="btn" href="owner.html">
        <span class="label">Owner Console <small>Manage all your restaurants</small></span>
        <span class="arrow">&rarr;</span>
      </a>
      <a class="btn" href="boracay.html">
        <span class="label">Restaurant App <small>POS, dashboard &amp; advisor</small></span>
        <span class="arrow">&rarr;</span>
      </a>
    </nav>

    <div class="foot">&copy; FranchiseOS</div>
  </main>
</body>
</html>
