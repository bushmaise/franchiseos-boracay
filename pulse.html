<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FranchiseOS — Today's Pulse</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,500;1,9..144,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a1712;
    --bg2:#0c1c15;
    --panel:#112319;
    --panel2:#14291d;
    --line:rgba(150,190,160,.12);
    --line2:rgba(150,190,160,.20);
    --cream:#f3efe3;
    --muted:#8aa294;
    --muted2:#6f897b;
    --gold:#dca85a;
    --gold2:#e8be77;
    --up:#73d99a;
    --down:#e08a6b;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{background:var(--bg);}
  body{
    font-family:'Hanken Grotesk',system-ui,sans-serif;
    color:var(--cream);
    min-height:100vh;
    display:flex;justify-content:center;
    background:
      radial-gradient(900px 500px at 80% -10%, rgba(220,168,90,.10), transparent 60%),
      radial-gradient(700px 500px at -10% 30%, rgba(115,217,154,.06), transparent 55%),
      var(--bg);
  }
  .app{
    width:100%;max-width:460px;min-height:100vh;
    padding:22px 20px 110px;position:relative;
  }
  /* top bar */
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:30px;}
  .brand{display:flex;align-items:center;gap:11px;}
  .brand .logo{
    width:40px;height:40px;border-radius:11px;
    background:linear-gradient(150deg,#16301f,#0e2016);
    border:1px solid var(--line2);
    display:flex;align-items:flex-end;justify-content:center;gap:3px;padding:9px;
  }
  .brand .logo i{display:block;width:4px;border-radius:2px;background:var(--gold);}
  .brand .logo i:nth-child(1){height:7px;opacity:.6}
  .brand .logo i:nth-child(2){height:12px;opacity:.8}
  .brand .logo i:nth-child(3){height:17px}
  .brand .name{font-family:'Fraunces',serif;font-size:21px;font-weight:700;letter-spacing:.2px;}
  .brand .name em{font-style:italic;font-weight:600;color:var(--gold);}
  .storepill{position:relative;}
  .storepill select{
    -webkit-appearance:none;appearance:none;
    font-family:'Hanken Grotesk',sans-serif;font-size:14.5px;font-weight:600;
    color:var(--cream);background:rgba(115,217,154,.07);
    border:1px solid var(--line2);border-radius:999px;
    padding:9px 34px 9px 30px;cursor:pointer;outline:none;
  }
  .storepill::before{content:"";position:absolute;left:13px;top:50%;transform:translateY(-50%);
    width:8px;height:8px;border-radius:50%;background:var(--up);box-shadow:0 0 8px var(--up);}
  .storepill::after{content:"⌄";position:absolute;right:14px;top:46%;transform:translateY(-50%);color:var(--muted);font-size:14px;pointer-events:none;}

  /* page title */
  .h1{font-family:'Fraunces',serif;font-size:42px;line-height:1;font-weight:600;letter-spacing:-.5px;margin-bottom:6px;}
  .h1 em{font-style:italic;color:var(--gold);}
  .subtitle{color:var(--muted);font-size:14.5px;font-weight:500;margin-bottom:22px;letter-spacing:.2px;}

  /* hero card */
  .hero{
    background:
      radial-gradient(420px 220px at 90% 0%, rgba(220,168,90,.12), transparent 60%),
      linear-gradient(160deg,var(--panel2),var(--bg2));
    border:1px solid var(--line);border-radius:22px;padding:22px 22px 8px;
    margin-bottom:14px;overflow:hidden;position:relative;
  }
  .hero .cap{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:11.5px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:14px;}
  .hero .cap .dot{width:9px;height:9px;border-radius:50%;background:var(--up);box-shadow:0 0 8px var(--up);}
  .hero .big{font-family:'Fraunces',serif;font-size:58px;line-height:.95;font-weight:600;letter-spacing:-1px;display:flex;align-items:baseline;gap:4px;}
  .hero .big .cur{font-size:30px;font-weight:500;color:var(--muted);}
  .hero .sub2{font-size:13px;color:var(--muted);margin-top:6px;font-weight:500;}
  .hero .delta{margin-top:12px;font-size:15px;font-weight:600;display:inline-flex;align-items:center;gap:6px;}
  .hero .delta.up{color:var(--up);}
  .hero .delta.down{color:var(--down);}
  .hero .delta.flat{color:var(--muted);}
  .spark{margin:14px -22px 0;display:block;width:calc(100% + 44px);height:88px;}

  /* metric grid */
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:26px;}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:16px 16px 15px;}
  .stat .lbl{color:var(--muted);font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:9px;}
  .stat .num{font-family:'Fraunces',serif;font-size:30px;font-weight:600;line-height:1;letter-spacing:-.5px;}
  .stat .num.sm{font-size:21px;line-height:1.15;}
  .stat .foot{font-size:12.5px;font-weight:600;margin-top:7px;}
  .stat .foot.up{color:var(--up);}
  .stat .foot.down{color:var(--down);}
  .stat .foot.mut{color:var(--muted2);font-weight:500;}

  /* advisor */
  .advhead{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px;}
  .advhead h2{font-family:'Fraunces',serif;font-size:25px;font-weight:600;}
  .advhead h2 em{font-style:italic;color:var(--gold);}
  .advhead .more{color:var(--gold);font-size:13.5px;font-weight:600;cursor:pointer;background:none;border:none;font-family:inherit;}
  .insight{
    background:linear-gradient(150deg,var(--panel2),var(--panel));
    border:1px solid var(--line);border-radius:18px;padding:16px 17px;margin-bottom:11px;
    display:flex;gap:13px;align-items:flex-start;
  }
  .insight .spk{color:var(--gold);font-size:17px;line-height:1.4;flex:none;}
  .insight .body{font-size:14.5px;line-height:1.55;color:#dfe7df;}
  .insight .body b{color:var(--cream);font-weight:700;}
  .insight .body .hi{color:var(--gold2);font-weight:700;}

  .loading{padding:60px 0;text-align:center;color:var(--muted);font-size:15px;}
  .err{background:#2a1512;border:1px solid #5a2a22;color:#f0b8aa;border-radius:14px;padding:14px;font-size:12.5px;white-space:pre-wrap;line-height:1.5;}

  /* bottom nav */
  .nav{
    position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:100%;max-width:460px;
    background:linear-gradient(0deg,var(--bg) 70%,transparent);
    padding:12px 18px max(16px,env(safe-area-inset-bottom));
    display:flex;justify-content:space-between;
  }
  .nav a{flex:1;text-decoration:none;display:flex;flex-direction:column;align-items:center;gap:5px;
    color:var(--muted2);font-size:11px;font-weight:600;letter-spacing:.3px;cursor:pointer;}
  .nav a.active{color:var(--gold);}
  .nav a svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.7;}

  .toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%) translateY(20px);
    background:#1b3326;border:1px solid var(--line2);color:var(--cream);padding:11px 18px;border-radius:999px;
    font-size:13.5px;font-weight:600;opacity:0;transition:.3s;pointer-events:none;z-index:9;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  /* entrance */
  .rise{opacity:0;transform:translateY(14px);animation:rise .6s cubic-bezier(.2,.7,.3,1) forwards;}
  @keyframes rise{to{opacity:1;transform:none;}}
</style>
</head>
<body>
<div class="app">
  <div class="topbar rise">
    <div class="brand">
      <div class="logo"><i></i><i></i><i></i></div>
      <div class="name">Franchise<em>OS</em></div>
    </div>
    <div class="storepill">
      <select id="store">
        <option value="3">Falafel Boracay</option>
        <option value="1">My Home Kitchen</option>
        <option value="2">Cloud Kitchen Lab</option>
        <option value="all">All stores</option>
      </select>
    </div>
  </div>

  <div class="h1 rise" style="animation-delay:.05s">Today's <em>pulse</em></div>
  <div class="subtitle rise" id="subtitle" style="animation-delay:.08s">Loading…</div>

  <div id="content"><div class="loading">Loading your numbers…</div></div>
</div>

<nav class="nav">
  <a class="active"><svg viewBox="0 0 24 24"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>Home</a>
  <a id="navPos"><svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 10h18"/></svg>POS</a>
  <a data-soon="Orders"><svg viewBox="0 0 24 24"><path d="M6 7h12l-1 13H7L6 7z"/><path d="M9 7a3 3 0 0 1 6 0"/></svg>Orders</a>
  <a data-soon="Stock"><svg viewBox="0 0 24 24"><path d="M12 3l9 5-9 5-9-5 9-5z"/><path d="M3 13l9 5 9-5"/></svg>Stock</a>
  <a id="navAdv"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M5 5l2 2M17 17l2 2M19 5l-2 2M7 17l-2 2"/></svg>Advisor</a>
</nav>

<div class="toast" id="toast"></div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
  'https://dzvfimkpcnexpihhfvpf.supabase.co',
  'sb_publishable_R0ONHQwxbn7ommQim6L97w_TsdLE7-_'
)

const STORES = {
  '1':{name:'My Home Kitchen', cur:'KWD'},
  '2':{name:'Cloud Kitchen Lab', cur:'KWD'},
  '3':{name:'Falafel Boracay', cur:'PHP'},
}
const CUR = { KWD:{sym:'KD ', dec:2}, PHP:{sym:'₱', dec:0} }

const content  = document.getElementById('content')
const subtitle = document.getElementById('subtitle')
const storeSel = document.getElementById('store')
const toastEl  = document.getElementById('toast')

let allRows = []

const dayName = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday']
const monName = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']
// The shop is in the Philippines, so "today" and daily grouping use Manila time,
// no matter where the dashboard is opened from.
const SHOP_TZ = 'Asia/Manila'
const _keyFmt = new Intl.DateTimeFormat('en-CA', {timeZone: SHOP_TZ, year:'numeric', month:'2-digit', day:'2-digit'})
const dateKey = d => _keyFmt.format(new Date(d))            // -> 'YYYY-MM-DD' in shop time
const addDaysKey = (key, n) => { const x=new Date(key+'T00:00:00Z'); x.setUTCDate(x.getUTCDate()+n); return x.toISOString().slice(0,10) }
const keyWeekday = key => new Date(key+'T00:00:00Z').getUTCDay()
const isExcluded = n => (n||'').trim().toLowerCase().includes('olive oil')

function money(n, cur){
  const c = CUR[cur] || {sym:cur+' ', dec:2}
  return c.sym + Number(n||0).toLocaleString('en-US',{minimumFractionDigits:0, maximumFractionDigits:c.dec})
}

function toast(msg){
  toastEl.textContent = msg; toastEl.classList.add('show')
  clearTimeout(toastEl._t); toastEl._t = setTimeout(()=>toastEl.classList.remove('show'),1900)
}

async function load(){
  try{
    const { data, error } = await supabase
      .from('sales_recorder')
      .select('item, qty, total, currency, restaurant_id, created_at')
      .order('created_at',{ascending:false})
      .limit(3000)
    if(error) throw error
    allRows = data || []
    render(storeSel.value)
  }catch(err){
    content.innerHTML = '<div class="err">'+JSON.stringify(err,null,2)+'</div>'
    subtitle.textContent = 'Could not load data'
  }
}

storeSel.onchange = ()=>render(storeSel.value)

// build per-day buckets for the selected store
function buildDays(storeVal){
  const rows = storeVal==='all' ? allRows
    : allRows.filter(r=>String(r.restaurant_id)===String(storeVal))
  const days = {}    // key -> {byCur, inv:Set, items:{}, qty}
  for(const r of rows){
    if(!r.created_at) continue
    const k = dateKey(r.created_at)
    const d = days[k] || (days[k]={byCur:{}, inv:new Set(), items:{}, qty:0})
    const cur = r.currency || 'KWD'
    d.byCur[cur] = (d.byCur[cur]||0) + Number(r.total||0)
    d.inv.add(r.created_at)
    const name=(r.item||'').trim()
    if(name && !isExcluded(name)){
      d.items[name]=(d.items[name]||0)+Number(r.qty||0)
      d.qty += Number(r.qty||0)
    }
  }
  return days
}

function primaryCur(day, storeVal){
  if(storeVal!=='all') return STORES[storeVal].cur
  let best='PHP', max=-1
  for(const c in (day?.byCur||{})){ if(day.byCur[c]>max){max=day.byCur[c]; best=c} }
  return best
}

function topItem(day){
  let n='—', q=0
  for(const k in day.items){ if(day.items[k]>q){q=day.items[k]; n=k} }
  return {name:n, qty:q}
}

function render(storeVal){
  const days = buildDays(storeVal)
  const keys = Object.keys(days).sort()      // ascending date
  const todayK = dateKey(new Date())

  if(keys.length===0){
    subtitle.textContent = (storeVal==='all'?'All stores':STORES[storeVal].name)+' · no sales yet'
    content.innerHTML = `
      <div class="insight rise"><div class="spk">✦</div><div class="body">
        No sales recorded for <b>${storeVal==='all'?'any store':STORES[storeVal].name}</b> yet.
        Open the <span class="hi">POS</span> to log the first sale of the day.</div></div>`
    return
  }

  // choose period: today if it has sales, else latest day with sales
  const hasToday = days[todayK] && Object.values(days[todayK].byCur).some(v=>v>0)
  const periodK = hasToday ? todayK : keys[keys.length-1]
  const day = days[periodK]
  const cur = primaryCur(day, storeVal)
  const rev = day.byCur[cur] || 0
  const orders = day.inv.size
  const avg = orders ? rev/orders : 0
  const top = topItem(day)

  // delta vs same weekday last week (period - 7d)
  const prevK = addDaysKey(periodK, -7)
  const prevRev = days[prevK] ? (days[prevK].byCur[cur]||0) : null
  let deltaPct = null
  if(prevRev && prevRev>0) deltaPct = ((rev - prevRev)/prevRev)*100

  // avg ticket history (other days, same currency)
  let tSum=0,tN=0
  for(const k of keys){ if(k===periodK) continue; const d=days[k]; const r=d.byCur[cur]||0; const o=d.inv.size; if(o){tSum+=r/o;tN++} }
  const avgHist = tN? tSum/tN : null
  const avgDelta = (avgHist!=null) ? avg-avgHist : null

  // orders history
  let oSum=0,oN=0
  for(const k of keys){ if(k===periodK) continue; const o=days[k].inv.size; if(o){oSum+=o;oN++} }
  const ordHist = oN? oSum/oN : null
  const ordDelta = (ordHist!=null)? Math.round(orders-ordHist) : null

  // sparkline data: last 12 days revenue in primary currency
  const last = keys.slice(-12)
  const series = last.map(k=>days[k].byCur[cur]||0)

  // labels (all derived from shop-time date keys)
  const pdParts = periodK.split('-')           // [YYYY, MM, DD]
  const pdWeekday = keyWeekday(periodK)
  const pdDay = Number(pdParts[2]); const pdMon = Number(pdParts[1]) - 1
  const capLabel = hasToday ? 'NET REVENUE · TODAY' : 'NET REVENUE · '+dayName[pdWeekday].toUpperCase()+' '+pdDay+' '+monName[pdMon]
  const storeName = storeVal==='all' ? 'All stores' : STORES[storeVal].name
  const tkParts = todayK.split('-')
  subtitle.textContent = (hasToday? dayName[keyWeekday(todayK)]+' · '+monName[Number(tkParts[1])-1]+' '+Number(tkParts[2])
                                  : 'Latest active day · '+periodK) + ' · ' + storeName

  // secondary currency line (for "all")
  let sub2=''
  if(storeVal==='all'){
    const others = Object.keys(day.byCur).filter(c=>c!==cur && day.byCur[c]>0)
      .map(c=>money(day.byCur[c],c))
    if(others.length) sub2 = `<div class="sub2">+ ${others.join('  ·  ')} (other currencies)</div>`
  }

  let deltaHtml = `<div class="delta flat">— first period on record</div>`
  if(deltaPct!=null){
    const up = deltaPct>=0
    deltaHtml = `<div class="delta ${up?'up':'down'}">${up?'▲':'▼'} ${Math.abs(deltaPct).toFixed(1)}% vs ${dayName[pdWeekday].slice(0,3)} last week</div>`
  }

  content.innerHTML = `
    <div class="hero rise" style="animation-delay:.10s">
      <div class="cap"><span class="dot"></span>${capLabel}</div>
      <div class="big"><span class="cur">${(CUR[cur]||{sym:cur}).sym.trim()}</span>${Number(rev).toLocaleString('en-US',{maximumFractionDigits:(CUR[cur]||{dec:2}).dec})}</div>
      ${sub2}
      ${deltaHtml}
      ${sparkline(series, cur)}
    </div>

    <div class="grid">
      <div class="stat rise" style="animation-delay:.14s">
        <div class="lbl">Orders</div><div class="num">${orders}</div>
        ${footHtml(ordDelta, v=> (v>=0?'+':'')+v+' vs avg', true)}
      </div>
      <div class="stat rise" style="animation-delay:.18s">
        <div class="lbl">Avg ticket</div><div class="num">${orders? money(avg,cur):'—'}</div>
        ${orders? footHtml(avgDelta, v=> (v>=0?'+':'−')+money(Math.abs(v),cur), false) : '<div class="foot mut">no orders</div>'}
      </div>
      <div class="stat rise" style="animation-delay:.22s">
        <div class="lbl">Items sold</div><div class="num">${day.qty}</div>
        <div class="foot mut">${Object.keys(day.items).length} product${Object.keys(day.items).length===1?'':'s'}</div>
      </div>
      <div class="stat rise" style="animation-delay:.26s">
        <div class="lbl">Top item</div><div class="num sm">${top.qty? top.name : '—'}</div>
        <div class="foot mut">${top.qty? top.qty+' sold' : '&nbsp;'}</div>
      </div>
    </div>

    <div class="advhead rise" style="animation-delay:.30s">
      <h2>Advisor <em>insights</em></h2>
      <button class="more" id="askMore">Ask more →</button>
    </div>
    <div id="insights">${insightsHtml({hasToday,storeName,cur,rev,orders,avg,top,deltaPct,ordDelta,prevRev}, false)}</div>
  `

  document.getElementById('askMore').onclick = ()=>{
    document.getElementById('insights').innerHTML =
      insightsHtml({hasToday,storeName,cur,rev,orders,avg,top,deltaPct,ordDelta,prevRev}, true)
  }
}

function footHtml(delta, fmtFn, isInt){
  if(delta==null) return '<div class="foot mut">no history yet</div>'
  if((isInt && delta===0) || (!isInt && Math.abs(delta)<0.005)) return '<div class="foot mut">flat vs avg</div>'
  const up = delta>=0
  return `<div class="foot ${up?'up':'down'}">${fmtFn(delta)}</div>`
}

function sparkline(series, cur){
  const w=460, h=88, pad=6
  const data = series.length? series : [0,0]
  const max=Math.max(...data,1), min=Math.min(...data,0)
  const span=(max-min)||1
  const n=data.length
  const X=i=> n<=1? w/2 : pad + i*(w-2*pad)/(n-1)
  const Y=v=> (h-12) - ((v-min)/span)*(h-26)
  let d='', area=''
  data.forEach((v,i)=>{ const x=X(i).toFixed(1), y=Y(v).toFixed(1); d+=(i?'L':'M')+x+' '+y+' '; })
  area = d + `L ${X(n-1).toFixed(1)} ${h} L ${X(0).toFixed(1)} ${h} Z`
  return `<svg class="spark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dca85a" stop-opacity=".30"/>
      <stop offset="1" stop-color="#dca85a" stop-opacity="0"/></linearGradient></defs>
    <path d="${area}" fill="url(#g)"/>
    <path d="${d}" fill="none" stroke="#dca85a" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`
}

function insightsHtml(s, expanded){
  const list=[]
  // headline
  if(!s.orders){
    list.push(`No sales logged for <b>${s.storeName}</b> in this period. Open the <span class="hi">POS</span> to start selling.`)
  } else if(s.deltaPct!=null){
    const up=s.deltaPct>=0
    list.push(`${s.hasToday?"Today's":"This day's"} net is <b>${money(s.rev,s.cur)}</b>, <span class="hi">${up?'up':'down'} ${Math.abs(s.deltaPct).toFixed(0)}%</span> vs the same day last week. ${up?'Momentum is good — keep the bestseller stocked.':'Dip vs last week — consider a quick promo on a slow item.'}`)
  } else {
    list.push(`${s.hasToday?"Today's":"This day's"} net is <b>${money(s.rev,s.cur)}</b> across <b>${s.orders}</b> order${s.orders===1?'':'s'}. Not enough history yet to compare — a few more days and trends will show.`)
  }
  // top seller
  if(s.top && s.top.qty){
    list.push(`Top seller is <b>${s.top.name}</b> (<span class="hi">${s.top.qty} sold</span>). Prep extra from the morning to avoid wait times at the rush.`)
  }
  if(expanded){
    if(s.orders){
      list.push(`Average ticket is <b>${money(s.avg,s.cur)}</b>. Try bundling the top seller with a drink to nudge it higher.`)
    }
    if(s.ordDelta!=null && s.ordDelta!==0){
      const up=s.ordDelta>0
      list.push(`Order count is <b>${up?'above':'below'} your daily average</b> (${(up?'+':'')+s.ordDelta}). ${up?'Make sure staffing matches the demand.':'A light day — good time for prep and cleaning.'}`)
    }
    list.push(`Want a deeper, AI-written advisor on these numbers? That's the next upgrade — connect the Claude advisor and ask it anything about the business.`)
  }
  return list.map(t=>`<div class="insight rise"><div class="spk">✦</div><div class="body">${t}</div></div>`).join('')
}

// bottom nav wiring
